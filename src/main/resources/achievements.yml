categories:
  main:
    title: "&6SopAchievements"
    description: "&7Main achievement tab"
    icon: GRASS_BLOCK
    background: minecraft:textures/gui/advancements/backgrounds/stone.png

achievements:
  first_join:
    category: main
    title: "&aFirst Steps"
    description: "&7Join the server once."
    icon: OAK_DOOR
    frame: task
    x: 0
    y: 0
    trigger:
      type: join
      amount: 1
    rewards:
      message: "&aYou unlocked %achievement_title%&a."

  stone_miner:
    category: main
    title: "&7Stone Miner"
    description: "&7Break 16 stone blocks."
    icon: STONE_PICKAXE
    frame: task
    x: 2
    y: 0
    parent: first_join
    trigger:
      type: break_block
      value: STONE
      amount: 16

  zombie_slayer:
    category: main
    title: "&2Zombie Slayer"
    description: "&7Kill 5 zombies."
    icon: IRON_SWORD
    frame: goal
    x: 4
    y: 0
    parent: stone_miner
    trigger:
      type: kill_entity
      value: ZOMBIE
      amount: 5

  bread_maker:
    category: main
    title: "&6Bread Maker"
    description: "&7Craft bread once."
    icon: BREAD
    frame: task
    x: 2
    y: 2
    parent: first_join
    trigger:
      type: craft_item
      value: BREAD
      amount: 1

  sky_to_bottom:
    category: main
    title: "&cFrom Sky To Bedrock"
    description: "&7Fall from high in the sky to near bedrock in one drop."
    icon: FEATHER
    frame: challenge
    x: 6
    y: 0
    parent: zombie_slayer
    trigger:
      type: fall_range
      start-y-min: 250
      end-y-max: 5
      same-world-only: true
      deny-flight: true
      deny-vehicles: true
      deny-elytra: true
    rewards:
      message: "&6Challenge complete: %achievement_title%"
      commands:
        - "[console] give %player_name% diamond 3"
        - "[console] xp add %player_name% 10 levels"

  apple_taste:
    category: main
    title: "&cFresh Bite"
    description: "&7Eat an apple."
    icon: APPLE
    frame: task
    x: 0
    y: 2
    parent: first_join
    trigger:
      type: consume_item
      value: APPLE
      amount: 1

  collector:
    category: main
    title: "&eCollector"
    description: "&7Pick up 32 cobblestone."
    icon: COBBLESTONE
    frame: task
    x: 2
    y: 4
    parent: stone_miner
    trigger:
      type: pickup_item
      value: COBBLESTONE
      amount: 32

  enchanter:
    category: main
    title: "&bEnchanter"
    description: "&7Enchant an item once."
    icon: ENCHANTING_TABLE
    frame: goal
    x: 4
    y: 2
    parent: bread_maker
    trigger:
      type: enchant_item
      amount: 1

  animal_friend:
    category: main
    title: "&dAnimal Friend"
    description: "&7Tame a wolf."
    icon: BONE
    frame: task
    x: 6
    y: 2
    parent: bread_maker
    trigger:
      type: tame_entity
      value: WOLF
      amount: 1

  farmer_family:
    category: main
    title: "&aFarmer Family"
    description: "&7Breed 3 cows."
    icon: WHEAT
    frame: goal
    x: 8
    y: 2
    parent: animal_friend
    trigger:
      type: breed_entity
      value: COW
      amount: 3

  dimension_traveler:
    category: main
    title: "&5Traveler"
    description: "&7Enter the Nether."
    icon: NETHERRACK
    frame: task
    x: 10
    y: 0
    parent: zombie_slayer
    trigger:
      type: enter_world
      environment: NETHER
      amount: 1
    conditions:
      type: all
      checks:
        - type: "string not equals"
          input: "%player_gamemode%"
          output: "SPECTATOR"

  builder:
    category: main
    title: "&eBuilder"
    description: "&7Place 32 planks."
    icon: OAK_PLANKS
    frame: task
    x: 0
    y: 4
    parent: first_join
    trigger:
      type: block_place
      value: OAK_PLANKS,BIRCH_PLANKS,SPRUCE_PLANKS
      amount: 32

  chatter:
    category: main
    title: "&bSocial Spark"
    description: "&7Send 10 chat messages."
    icon: BOOK
    frame: task
    x: 4
    y: 4
    parent: first_join
    trigger:
      type: chat
      value: any
      amount: 10

  command_user:
    category: main
    title: "&dCommand Line"
    description: "&7Use /spawn once."
    icon: COMPASS
    frame: task
    x: 6
    y: 4
    parent: chatter
    trigger:
      type: execute_command
      value: /spawn
      amount: 1

  marathon:
    category: main
    title: "&fMarathon"
    description: "&7Travel 1000 blocks."
    icon: LEATHER_BOOTS
    frame: goal
    x: 8
    y: 4
    parent: chatter
    trigger:
      type: travel_distance
      amount: 1000

  tough_skin:
    category: main
    title: "&cTough Skin"
    description: "&7Take 40 damage from any source."
    icon: SHIELD
    frame: task
    x: 10
    y: 2
    parent: zombie_slayer
    trigger:
      type: damage_taken
      value: any
      amount: 40

  hunter_force:
    category: main
    title: "&4Hunter Force"
    description: "&7Deal 50 damage to hostile mobs."
    icon: BOW
    frame: goal
    x: 12
    y: 2
    parent: zombie_slayer
    trigger:
      type: damage_dealt
      value: ZOMBIE,SKELETON,CREEPER,SPIDER
      amount: 50
    conditions:
      type: all
      checks:
        - type: "number >="
          input: "%damage_amount%"
          output: "1"
        - type: "string equals"
          input: "%player_world%"
          output: "world"

  lucky_fisher:
    category: main
    title: "&bLucky Fisher"
    description: "&7Catch 5 cod or salmon."
    icon: FISHING_ROD
    frame: task
    x: 10
    y: 4
    parent: bread_maker
    trigger:
      type: fish_item
      value: COD,SALMON
      amount: 5

  berry_picker:
    category: main
    title: "&dBerry Picker"
    description: "&7Harvest 8 sweet berries."
    icon: SWEET_BERRIES
    frame: task
    x: 12
    y: 4
    parent: bread_maker
    trigger:
      type: harvest
      value: SWEET_BERRIES
      amount: 8

  nether_builder:
    category: main
    title: "&cNether Contractor"
    description: "&7Place 16 nether blocks while in the Nether."
    icon: NETHER_BRICKS
    frame: goal
    x: 14
    y: 4
    parent: dimension_traveler
    trigger:
      type: block_place
      value: NETHERRACK,NETHER_BRICKS,NETHER_BRICK_FENCE
      amount: 16
    conditions:
      type: all
      checks:
        - type: "string equals"
          input: "%player_world%"
          output: "world_nether"
        - type: "string equals"
          input: "%player_biome%"
          output: "NETHER_WASTES"
    rewards:
      message: "&cNether work approved."

  command_sprinter:
    category: main
    title: "&aFast Travel Clerk"
    description: "&7Use /spawn while standing below Y 40."
    icon: CLOCK
    frame: task
    x: 14
    y: 2
    parent: command_user
    trigger:
      type: execute_command
      value: /spawn
      amount: 1
    conditions:
      type: all
      checks:
        - type: "number <="
          input: "%player_y%"
          output: "40"
    rewards:
      commands:
        - "[player] me speedran /spawn underground"

  jumper:
    category: main
    title: "&eJumping Bean"
    description: "&7Jump 250 times."
    icon: RABBIT_FOOT
    frame: task
    x: 16
    y: 0
    parent: first_join
    trigger:
      type: statistic
      statistic: JUMP
      amount: 250

  sleeper:
    category: main
    title: "&9Heavy Sleeper"
    description: "&7Sleep through 5 nights."
    icon: RED_BED
    frame: goal
    x: 16
    y: 2
    parent: command_user
    trigger:
      type: statistic
      statistic: SLEEP_IN_BED
      amount: 5

  walker:
    category: main
    title: "&fRoad Walker"
    description: "&7Walk 5000 centimeters on land."
    icon: IRON_BOOTS
    frame: task
    x: 16
    y: 4
    parent: marathon
    trigger:
      type: statistic
      statistic: WALK_ONE_CM
      amount: 5000

  chest_looter:
    category: main
    title: "&6Treasure Fingers"
    description: "&7Open 25 chests."
    icon: CHEST
    frame: goal
    x: 18
    y: 2
    parent: collector
    trigger:
      type: statistic
      statistic: CHEST_OPENED
      amount: 25

  hunter_training:
    category: main
    title: "&6Hunter Training"
    description: "&7Kill 10 zombies and 5 skeletons."
    icon: CROSSBOW
    frame: challenge
    x: 18
    y: 0
    parent: zombie_slayer
    requirements:
      type: all
      criteria:
        zombies:
          trigger:
            type: kill_entity
            value: ZOMBIE
            amount: 10
        skeletons:
          trigger:
            type: kill_entity
            value: SKELETON
            amount: 5
    rewards:
      message: "&6Combat training complete."

  resource_sampler:
    category: main
    title: "&bResource Sampler"
    description: "&7Break stone or mine coal ore."
    icon: COAL_ORE
    frame: goal
    x: 18
    y: 4
    parent: stone_miner
    requirements:
      type: any
      criteria:
        stone:
          trigger:
            type: break_block
            value: STONE
            amount: 32
        coal:
          trigger:
            type: break_block
            value: COAL_ORE
            amount: 12

  furnace_worker:
    category: main
    title: "&6Furnace Worker"
    description: "&7Take 32 iron ingots out of a furnace."
    icon: FURNACE
    frame: task
    x: 20
    y: 0
    parent: bread_maker
    trigger:
      type: smelt_item
      value: IRON_INGOT
      amount: 32

  collector_cache:
    category: main
    title: "&eStockpile"
    description: "&7Hold 64 cobblestone in your inventory at once."
    icon: BARREL
    frame: task
    x: 20
    y: 2
    parent: collector
    trigger:
      type: inventory_contains
      value: COBBLESTONE
      amount: 64

  vanilla_story:
    category: main
    title: "&5Storyline Link"
    description: "&7Complete the vanilla Nether advancement."
    icon: CRYING_OBSIDIAN
    frame: goal
    x: 20
    y: 4
    parent: dimension_traveler
    trigger:
      type: player_advancement
      value: minecraft:story/enter_the_nether
